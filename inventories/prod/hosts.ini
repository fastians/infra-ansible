# Mek-Lab app hosts — three tiers (use --limit to target one tier)
#
# 1. GCP legacy     — backend-server, salome-server
# 2. AWS staging    — backend-aws-staging, salome-aws-staging (all-in-one API host)
# 3. AWS production — split or all-in-one:
#      all-in-one: backend-aws-prod runs backend + geo + llm (nginx → localhost)
#      split:      backend-aws-prod + geo-aws-prod + llm-aws-prod + salome-aws-prod
#                  (nginx on api host proxies /geo/ and /llm/ to private VPC IPs)

# --- 1. GCP (kept) ---
[backend_legacy]
backend-server ansible_host=34.47.101.190 ansible_user=mateen_fastians

[salome_legacy]
salome-server ansible_host=34.47.115.135 ansible_user=mateen_fastians

# --- 2. AWS staging (all-in-one API: backend + geo + llm on one VM) ---
[backend_staging]
backend-aws-staging ansible_host=3.35.138.242 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[salome_staging]
salome-aws-staging ansible_host=13.209.14.89 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

# --- 3. AWS production ---
[backend_production]
backend-aws-prod ansible_host=15.164.227.138 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Dedicated GEO/LLM hosts — uncomment after Terraform apply (enable_split_microservices = true)
[geo_production]
geo-aws-prod ansible_host=54.180.250.140 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[llm_production]
llm-aws-prod ansible_host=54.180.230.39 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[salome_production]
salome-aws-prod ansible_host=3.34.135.134 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[backend:children]
backend_staging
backend_production

[geo:children]
geo_production

[llm:children]
llm_production

[salome:children]
salome_staging
salome_production

[monitoring]
monitoring-server
