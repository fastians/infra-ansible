# Mek-Lab app hosts — three tiers (use --limit to target one tier)
#
# 1. GCP legacy     — backend-server, salome-server (unchanged)
# 2. AWS staging    — backend-aws-staging, salome-aws-staging (t3.large; Terraform aws-app-staging)
# 3. AWS production — backend-aws-prod, salome-aws-prod (m6i.2xlarge; Terraform aws-app-production)
#
# Default [backend] / [salome] = staging only. Add production to children when ready to deploy prod apps.

# --- 1. GCP (kept) ---
[backend_legacy]
backend-server ansible_host=34.47.101.190 ansible_user=mateen_fastians

[salome_legacy]
salome-server ansible_host=34.47.115.135 ansible_user=mateen_fastians

# --- 2. AWS staging (EC2: mek-lab-app-staging-backend / -salome; was app-prod-*) ---
[backend_staging]
backend-aws-staging ansible_host=3.35.138.242 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[salome_staging]
salome-aws-staging ansible_host=13.209.14.89 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

# --- 3. AWS production (m6i.2xlarge; subnet 10.2.2.0/24 in shared VPC with staging) ---
[backend_production]
backend-aws-prod ansible_host=15.164.227.138 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[salome_production]
salome-aws-prod ansible_host=3.34.135.134 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[backend:children]
backend_staging
backend_production

[salome:children]
salome_staging
salome_production

[monitoring]
monitoring-server
