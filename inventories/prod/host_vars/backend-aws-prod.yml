---
# AWS production backend/API host (Terraform: aws-app-production).
# Split mode: backend only on this VM; GEO/LLM on geo-aws-prod + llm-aws-prod.
ansible_remote_tmp: /tmp/ansible-remote-{{ inventory_hostname }}
app_skip_git_sync: false
monitoring_enabled: true

backend_split_microservices: true
backend_install_freecad: false

# GEO runs on standalone EC2 geo-aws-prod (i-06c4e1884908fd9bf, private IP 10.2.2.171:8001).
# Migrated back from EKS cluster `mek-lab` (decommissioned) on 2026-06-23.
nginx_geo_upstream: "http://10.2.2.171:8001"
nginx_llm_upstream: "http://10.2.2.191:8002"
geo_server_internal_url: "http://10.2.2.171:8001"
llm_server_internal_url: "http://10.2.2.191:8002"

nginx_server_name: "{{ api_public_host }}"
nginx_bind_http_to_inventory_ip: true
nginx_certbot_auto: true
certbot_admin_email: "{{ contact_email }}"
prometheus_instance: backend-aws-prod

backend_allow_public_web: true
python_app_git_reset_to_origin: true

# Backend-only on API host (geoserver/llmserver run on dedicated GEO/LLM VMs).
python_apps:
  - name: MEK_LAB_BACKEND
    port: 8000
    repo_url: "{{ vault_mek_lab_backend_repo_url }}"
    branch: main
    description: "Mek-Lab API (public via nginx → /)"
    app_base_dir: "/home/mateen_fastians/.apps"
    app_env_template: "backendserver.env.j2"
    app_systemd_name: backendserver
    app_requirements_path: "requirements.txt"
    app_entry_point: "app.main:app"
