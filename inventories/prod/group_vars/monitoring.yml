# Monitor server (brain + probe) - Grafana datasources use localhost
grafana_datasource_prometheus_url: "http://localhost:9090"
grafana_datasource_loki_url: "http://localhost:3100"
grafana_datasource_alertmanager_url: "http://localhost:9093"

# Optional: comma-separated emails for Grafana alert notifications (provisioned contact point "Default")
# grafana_alert_emails: "ops@example.com"

# Prometheus scrape lists: omit prometheus_node_targets / prometheus_fastapi_targets to build from inventory
# (ansible_host + host_vars prometheus_instance). See roles/prometheus/templates/prometheus.yml.j2.

# Blackbox HTTP probes (availability from the monitor)
blackbox_probe_targets:
  - "https://{{ api_public_host }}/health"
  - "https://{{ salome_public_host }}/health"

# Telegram: Alertmanager sends alerts here. Set both to enable; or pass -e alertmanager_telegram_bot_token=TOKEN -e alertmanager_telegram_chat_id=CHAT_ID
alertmanager_telegram_bot_token: ""
alertmanager_telegram_chat_id: ""
