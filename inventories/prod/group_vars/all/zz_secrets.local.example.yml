---
# Local override file for production secrets.
# Copy to zz_secrets.local.yml (gitignored) and fill real values.
#
# cp inventories/prod/group_vars/all/zz_secrets.local.example.yml \
#    inventories/prod/group_vars/all/zz_secrets.local.yml
#
# "zz_" prefix ensures this file is loaded after secrets.yml.

vault_mek_lab_backend_repo_url: "https://github.com/your-org/backend.git"
vault_geoserver_repo_url: "https://github.com/your-org/geoserver.git"
vault_meklab_llm_repo_url: "https://github.com/your-org/llm.git"
vault_salome_repo_url: "https://github.com/your-org/salome.git"
vault_salome_engineering_repo_url: "https://github.com/your-org/salome-fastapi.git"
vault_geoserver_engineering_repo_url: "https://github.com/your-org/geoserver-backend.git"

vault_backend_postgres_admin_password: "CHANGE_ME"
vault_backend_bootstrap_admin_password: "CHANGE_ME"
vault_backend_database_url: "postgresql://user:password@localhost:5432/db"
vault_backend_secret_key: "CHANGE_ME"
vault_internal_api_key: "CHANGE_ME"
vault_sendgrid_api_key: ""
vault_sendgrid_from_email: ""
vault_aws_access_key_id: ""
vault_aws_secret_access_key: ""
vault_aws_ses_region: "ap-northeast-2"
vault_aws_ses_from_email: "contact@mek-lab.com"
vault_aws_ses_sender_name: "Mek-Lab"
vault_postmark_api_key: ""   # legacy
vault_notify_email: "contact@mek-lab.com"   # comma-separated ops inbox(es)
vault_gmail_user: ""
vault_gmail_app_password: ""
vault_toss_secret_key: ""   # Toss Payments billing — from Toss merchant dashboard, NOT Vercel (backend runs on EC2, not Vercel)

vault_llm_database_url: "postgresql://user:password@localhost:5432/db"
vault_mem0_api_key: ""
vault_openrouter_api_key: ""
vault_pinecone_api_key: ""
