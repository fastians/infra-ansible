- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - software-properties-common
    state: present
  become: yes
  tags: [grafana]

- name: Add Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present
  become: yes
  tags: [grafana]

- name: Add Grafana repository
  apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present
  become: yes
  tags: [grafana]

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes
  become: yes
  tags: [grafana]

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0644'
  notify: restart grafana
  become: yes
  tags: [grafana]

- name: Ensure datasource provisioning directory exists
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  become: yes
  tags: [grafana]

- name: Find existing datasource config files
  find:
    path: /etc/grafana/provisioning/datasources
    patterns: "*.yml"
  register: old_datasource_files
  become: yes
  tags: [grafana]

- name: Remove existing datasource configs (avoid leftover alertmanager etc.)
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ old_datasource_files.files }}"
  when: old_datasource_files.matched > 0
  become: yes
  tags: [grafana]

# Do not provision datasources via YAML - Grafana 12 exits on provisioning error.
# Datasources are added via API after Grafana starts (below).

- name: Ensure dashboard provisioning directory exists
  file:
    path: /etc/grafana/provisioning/dashboards/json
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  become: yes
  tags: [grafana]

- name: Deploy dashboard provider
  template:
    src: dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/provider.yml
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Deploy Logs & overview dashboard
  copy:
    src: dashboards/logs-and-overview.json
    dest: /etc/grafana/provisioning/dashboards/json/logs-and-overview.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Download Node Exporter Full dashboard (Grafana.com 1860)
  get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /etc/grafana/provisioning/dashboards/json/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Fix Node Exporter dashboard datasource UID for provisioning
  replace:
    path: /etc/grafana/provisioning/dashboards/json/node-exporter-full.json
    regexp: '\$\{ds_prometheus\}'
    replace: 'prometheus'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Set Node Exporter dashboard UID for demo links
  replace:
    path: /etc/grafana/provisioning/dashboards/json/node-exporter-full.json
    regexp: '"uid":\s*null'
    replace: '"uid": "node-exporter-full"'
  become: yes
  tags: [grafana]

- name: Deploy Demo overview dashboard
  copy:
    src: dashboards/demo-overview.json
    dest: /etc/grafana/provisioning/dashboards/json/demo-overview.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Deploy SLO overview dashboard
  copy:
    src: dashboards/slo-overview.json
    dest: /etc/grafana/provisioning/dashboards/json/slo-overview.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Ensure alerting provisioning directory exists
  file:
    path: /etc/grafana/provisioning/alerting
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  become: yes
  tags: [grafana]

- name: Deploy alerting contact points
  template:
    src: alerting-contact-points.yml.j2
    dest: /etc/grafana/provisioning/alerting/contact-points.yml
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Deploy alerting notification policies
  template:
    src: alerting-notification-policies.yml.j2
    dest: /etc/grafana/provisioning/alerting/notification-policies.yml
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  tags: [grafana]

- name: Ensure Prometheus is up before Grafana starts (Grafana 12 validates datasources)
  wait_for:
    port: 9090
    host: 127.0.0.1
    delay: 2
    timeout: 60
  become: yes
  tags: [grafana]

- name: Ensure Loki is up before Grafana starts (Grafana 12 validates datasources)
  wait_for:
    port: 3100
    host: 127.0.0.1
    delay: 2
    timeout: 60
  become: yes
  tags: [grafana]

- name: Start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started
  become: yes
  tags: [grafana]

- name: Wait for Grafana HTTP
  wait_for:
    port: 3000
    host: 127.0.0.1
    delay: 5
    timeout: 90
  become: yes
  tags: [grafana]

- name: Add Prometheus datasource via API (Grafana 12 skip file provisioning)
  uri:
    url: "http://127.0.0.1:3000/api/datasources"
    method: POST
    user: admin
    password: "{{ grafana_admin_password | default('admin') }}"
    force_basic_auth: true
    body_format: json
    body:
      name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://127.0.0.1:9090
      access: proxy
      isDefault: true
    status_code: [200, 201, 409]
  register: _ds_prom
  failed_when: false
  tags: [grafana]

- name: Add Loki datasource via API (Grafana 12 skip file provisioning)
  uri:
    url: "http://127.0.0.1:3000/api/datasources"
    method: POST
    user: admin
    password: "{{ grafana_admin_password | default('admin') }}"
    force_basic_auth: true
    body_format: json
    body:
      name: Loki
      type: loki
      uid: loki
      url: http://127.0.0.1:3100
      access: proxy
    status_code: [200, 201, 409]
  register: _ds_loki
  failed_when: false
  tags: [grafana]
