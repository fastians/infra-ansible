---
# Generic Python Application Deployment Tasks

- name: Install system dependencies
  apt:
    name:
      - acl
      - git
      - "python{{ app_python_version }}"
      - "python{{ app_python_version }}-venv"
      - "python{{ app_python_version }}-dev"
    state: present
    update_cache: yes
  become: yes

- name: Create application user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
  become: yes

- name: Create application directory
  file:
    path: "{{ app_base_dir }}/{{ app_name }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes

- name: Check if repository already exists
  stat:
    path: "{{ app_base_dir }}/{{ app_name }}/.git"
  register: repo_exists
  become: yes
  become_user: "{{ app_user }}"

- name: Stat application checkout root
  stat:
    path: "{{ app_base_dir }}/{{ app_name }}"
  register: app_root_stat
  become: yes

- name: Quarantine stale non-repository checkout (e.g. partial run left dirs without .git)
  command: mv "{{ app_base_dir }}/{{ app_name }}" "{{ app_base_dir }}/{{ app_name }}.stale-{{ ansible_facts['date_time']['epoch'] }}"
  become: yes
  become_user: "{{ app_user }}"
  when:
    - app_root_stat.stat.exists | default(false)
    - app_root_stat.stat.isdir | default(false)
    - not repo_exists.stat.exists | default(false)
    - not app_skip_git_sync | default(false)

- name: Clone repository
  git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_base_dir }}/{{ app_name }}"
    version: "{{ app_branch }}"
    force: no
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=10"
  become: yes
  become_user: "{{ app_user }}"
  when: (not repo_exists.stat.exists) and (not app_skip_git_sync | default(false))
  async: 300
  poll: 10

- name: Drop untracked bin/*.sif so git pull can merge (images belong under salome_runtime_dir, not repo bin/)
  shell: |
    set -euo pipefail
    cd "{{ app_base_dir }}/{{ app_name }}"
    [ -d bin ] || exit 0
    shopt -s nullglob
    for f in bin/*.sif; do
      [ -f "$f" ] || continue
      git ls-files --error-unmatch "$f" >/dev/null 2>&1 && continue
      rm -f "$f"
    done
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{ app_user }}"
  when:
    - repo_exists.stat.exists | default(false)
    - not app_skip_git_sync | default(false)
    - app_git_clean_untracked_sif | default(true)

- name: Update repository (reset to match remote)
  shell: |
    set -euo pipefail
    cd "{{ app_base_dir }}/{{ app_name }}"
    old="$(git rev-parse HEAD)"
    git fetch origin
    git checkout "{{ app_branch }}"
    git reset --hard "origin/{{ app_branch }}"
    new="$(git rev-parse HEAD)"
    if [ "$old" != "$new" ]; then echo "MEK_LAB_GIT_UPDATED=1"; fi
  args:
    executable: /bin/bash
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
  become: yes
  become_user: "{{ app_user }}"
  when:
    - repo_exists.stat.exists | default(false)
    - not app_skip_git_sync | default(false)
    - app_git_reset_to_origin | default(false)
  register: git_update_reset
  changed_when: "'MEK_LAB_GIT_UPDATED=1' in (git_update_reset.stdout | default(''))"

- name: Update repository
  shell: |
    set -euo pipefail
    cd "{{ app_base_dir }}/{{ app_name }}"
    git fetch origin
    git checkout "{{ app_branch }}"
    git pull origin "{{ app_branch }}"
  args:
    executable: /bin/bash
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
  become: yes
  become_user: "{{ app_user }}"
  when:
    - repo_exists.stat.exists | default(false)
    - not app_skip_git_sync | default(false)
    - not (app_git_reset_to_origin | default(false))
  register: git_update
  changed_when: "'Already up to date' not in git_update.stdout"

- name: Create extra application directories
  file:
    path: "{{ app_base_dir }}/{{ app_name }}/{{ extra_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop: "{{ app_extra_dirs }}"
  loop_control:
    loop_var: extra_dir
  become: yes
  when: app_extra_dirs | default([]) | length > 0

- name: Create Python virtual environment
  command: "python{{ app_python_version }} -m venv {{ app_base_dir }}/{{ app_name }}/.venv"
  args:
    creates: "{{ app_base_dir }}/{{ app_name }}/.venv/bin/python"
  become: yes
  become_user: "{{ app_user }}"
  when: not (app_use_conda | default(false))

- name: Install Python dependencies (venv)
  pip:
    requirements: "{{ app_base_dir }}/{{ app_name }}/{{ app_requirements_path }}"
    virtualenv: "{{ app_base_dir }}/{{ app_name }}/.venv"
    virtualenv_command: "python{{ app_python_version }} -m venv"
  become: yes
  become_user: "{{ app_user }}"
  when: not (app_use_conda | default(false))

- name: Install Python dependencies (conda env)
  shell: >
    "{{ app_conda_dir }}/envs/{{ app_conda_env_name }}/bin/python"
    -m pip install -r "{{ app_base_dir }}/{{ app_name }}/{{ app_requirements_path }}"
    --quiet --no-input
  become: yes
  become_user: "{{ app_user }}"
  when: app_use_conda | default(false)

- name: Create environment file
  template:
    src: "env/{{ app_env_template | default(app_name + '.env.j2') }}"
    dest: "{{ app_base_dir }}/{{ app_name }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  become: yes
  notify: "Restart {{ app_systemd_name }}"

- name: Create systemd service
  template:
    src: python_app.service.j2
    dest: "/etc/systemd/system/{{ app_systemd_name }}.service"
  become: yes
  notify: "Restart {{ app_systemd_name }}"

- name: Restart service when application source was updated
  systemd:
    name: "{{ app_systemd_name }}"
    state: restarted
    daemon_reload: yes
  become: yes
  when:
    - not app_skip_git_sync | default(false)
    - repo_exists.stat.exists | default(false)
    - >-
      (app_git_reset_to_origin | default(false) and (git_update_reset is defined) and (git_update_reset is changed))
      or (not (app_git_reset_to_origin | default(false)) and (git_update is defined) and (git_update is changed))

- name: Start and enable service
  systemd:
    name: "{{ app_systemd_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Copy deployment script
  template:
    src: deploy.sh.j2
    dest: "/home/{{ app_user }}/.deploy/{{ app_name }}.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes
  when: false  # Disabled for now, will create later
