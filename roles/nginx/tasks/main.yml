---
- name: Install system dependencies
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes
  become: yes

- name: Check for Let's Encrypt certificate
  stat:
    path: "/etc/letsencrypt/live/{{ nginx_server_name }}/fullchain.pem"
  register: nginx_le_cert_stat
  become: yes

- name: Ensure TLS options file exists (servers with certificate already present)
  copy:
    src: certbot-options-ssl-nginx.conf
    dest: /etc/letsencrypt/options-ssl-nginx.conf
    owner: root
    group: root
    mode: '0644'
    force: false
  when: nginx_le_cert_stat.stat.exists
  become: yes

- name: Ensure DH parameters for TLS (servers with certificate; can take minutes first time)
  command: openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
  args:
    creates: /etc/letsencrypt/ssl-dhparams.pem
  when: nginx_le_cert_stat.stat.exists
  become: yes

- name: Create nginx sites-available config
  template:
    src: "{{ nginx_template }}"
    dest: "/etc/nginx/sites-available/{{ nginx_config_name }}"
    owner: root
    group: root
    mode: '0644'
  vars:
    nginx_le_cert_present: "{{ nginx_le_cert_stat.stat.exists }}"
  become: yes
  notify: reload nginx

- name: Enable nginx site
  file:
    src: "/etc/nginx/sites-available/{{ nginx_config_name }}"
    dest: "/etc/nginx/sites-enabled/{{ nginx_config_name }}"
    state: link
  become: yes
  notify: reload nginx

- name: Remove legacy nginx site symlinks
  file:
    path: "/etc/nginx/sites-enabled/{{ item }}"
    state: absent
  loop: "{{ nginx_remove_legacy_configs | default([]) }}"
  when: item != nginx_config_name
  become: yes
  notify: reload nginx

- name: Remove legacy nginx site definitions
  file:
    path: "/etc/nginx/sites-available/{{ item }}"
    state: absent
  loop: "{{ nginx_remove_legacy_configs | default([]) }}"
  when: item != nginx_config_name
  become: yes
  notify: reload nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: yes
  notify: reload nginx

- name: Create metrics config
  template:
    src: metrics.conf.j2
    dest: /etc/nginx/conf.d/metrics.conf
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload nginx

- name: Ensure nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes
  become: yes

- name: Reload nginx before Certbot HTTP-01 check (serve /.well-known)
  meta: flush_handlers

- name: Issue TLS certificate via Certbot webroot (optional, backend API template only)
  include_tasks: certbot-webroot.yml
  when:
    - nginx_certbot_auto | default(false) | bool
    - (certbot_admin_email | default('') | length) > 0
    - not nginx_le_cert_stat.stat.exists
