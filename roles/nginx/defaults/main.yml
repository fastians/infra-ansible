---
# Default variables for nginx role (Backend defaults)
# Overridden by group_vars from site_constants.yml (api_public_host)
nginx_server_name: "{{ api_public_host | default('api.mek-lab.com') }}"
nginx_client_max_body_size: "500M"
nginx_template: "backend-nginx.conf.j2"
nginx_config_name: "api.conf"

# Set true on a host (with certbot_admin_email) to obtain/enable Let's Encrypt after nginx serves webroot.
nginx_certbot_auto: false
nginx_certbot_webroot: /var/www/certbot
# Required when nginx_certbot_auto is true (e.g. ops@example.com)
certbot_admin_email: ""

# Port 80 only: also match ansible_host (public IP) so http://<IP>/docs works in a browser.
nginx_bind_http_to_inventory_ip: false
# Optional extra server_name tokens on port 80 (e.g. another DNS name during migration).
nginx_extra_server_names: []

# Optional upstream overrides for split microservices (defaults: localhost on all-in-one hosts).
# Example on backend-aws-prod when GEO/LLM run on separate EC2 instances:
#   nginx_geo_upstream: "http://10.2.2.45:8001"
#   nginx_llm_upstream: "http://10.2.2.46:8002"
nginx_geo_upstream: "http://127.0.0.1:8001"
nginx_llm_upstream: "http://127.0.0.1:8002"

# Deploy conf.d/gzip-meklab.conf (JSON/GLTF compression on API nginx).
nginx_gzip_enabled: true
