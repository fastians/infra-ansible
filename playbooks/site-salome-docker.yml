---
# Stop bare salomeserver systemd service and run via Docker + push image to ECR.
# Usage: ansible-playbook -i inventories/prod/hosts.ini playbooks/site-salome-docker.yml --limit salome-aws-prod
- name: Salome — switch to Docker
  hosts: salome
  become: yes

  vars:
    app_base_dir: "/home/mateen_fastians/opt"
    app_name: "MEK_LAB_SALOME"
    app_dir: "{{ app_base_dir }}/{{ app_name }}"
    sif_name: "salome_meca-lgpl-2024.1.0-1-20240327-scibian-11.sif"
    sif_dest: "{{ app_dir }}/bin/{{ sif_name }}"
    aws_region: "{{ vault_aws_ses_region | default('ap-northeast-2') }}"

  tasks:
    - name: Install Docker, compose plugin, and AWS CLI
      apt:
        name:
          - docker.io
          - docker-compose-plugin
          - awscli
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - ubuntu
        - mateen_fastians

    - name: Stop and disable bare salomeserver
      systemd:
        name: salomeserver
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Ensure repo bin/ exists
      file:
        path: "{{ app_dir }}/bin"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Move SIF to repo bin/ if found in legacy location
      shell: |
        set -e
        for src in /home/ubuntu/{{ sif_name }} /home/mateen_fastians/opt/salome_meca/{{ sif_name }}; do
          if [ -f "$src" ]; then
            mv "$src" "{{ sif_dest }}"
            chown ubuntu:ubuntu "{{ sif_dest }}"
            exit 0
          fi
        done
        [ -f "{{ sif_dest }}" ] || { echo "SIF not found — run: make sif-download"; exit 1; }
      args:
        executable: /bin/bash
      changed_when: false

    - name: Pull latest code
      git:
        repo: "{{ vault_salome_engineering_repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: no
      become_user: mateen_fastians

    - name: Deploy app/.env
      template:
        src: "{{ playbook_dir }}/../roles/python_app/templates/env/salomeserver.env.j2"
        dest: "{{ app_dir }}/app/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      vars:
        app_user: ubuntu
        salome_code_aster_bin: ""

    - name: Build and start docker-compose
      shell: |
        cd {{ app_dir }}
        docker compose down --remove-orphans 2>/dev/null || true
        SALOME_SIF_PATH={{ sif_dest }} docker compose up --build -d
      args:
        executable: /bin/bash

    - name: Wait for container healthy
      shell: |
        docker inspect --format='{{ '{{' }}.State.Health.Status{{ '}}' }}' \
          $(docker compose -f {{ app_dir }}/docker-compose.yml ps -q salome-api)
      register: health
      until: health.stdout == "healthy"
      retries: 20
      delay: 10
      changed_when: false

    - name: Update nginx upstream to port 40010
      replace:
        path: /etc/nginx/sites-enabled/salome.conf
        regexp: 'localhost:8000'
        replace: 'localhost:40010'
      notify: reload nginx
      ignore_errors: yes

    - name: Get AWS account ID
      shell: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
          docker login --username AWS --password-stdin \
          {{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      args:
        executable: /bin/bash
      changed_when: false

    - name: Push image to ECR
      shell: |
        ECR={{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/mek-lab/salome
        IMAGE=$(docker compose -f {{ app_dir }}/docker-compose.yml images -q salome-api)
        docker tag "$IMAGE" "$ECR:latest"
        docker push "$ECR:latest"
      args:
        executable: /bin/bash
      changed_when: true

  handlers:
    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
