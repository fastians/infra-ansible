---
- name: Backend Server (apps only)
  hosts: backend
  become: yes
  vars:
    # Optional: ansible-playbook -e deploy_filter_systemd=backendserver [-e deploy_branch_override=main]
    _python_apps_target: >-
      {{
        python_apps
        if (deploy_filter_systemd | default('') == '')
        else (python_apps | selectattr('app_systemd_name', 'equalto', deploy_filter_systemd) | list)
      }}
  pre_tasks:
    - name: Validate backend secret configuration before deployment
      assert:
        that:
          - vault_backend_database_url is defined
          - vault_backend_database_url | length > 0
          - vault_backend_database_url != "CHANGE_ME"
          - vault_backend_database_url is match('^postgresql(\\+[^:]+)?:\\/\\/.+')
          - vault_backend_secret_key is defined
          - vault_backend_secret_key | length >= 32
          - vault_backend_secret_key != "CHANGE_ME"
          - vault_internal_api_key is defined
          - vault_internal_api_key | length > 0
          - vault_internal_api_key != "CHANGE_ME"
        fail_msg: >-
          Backend secrets are missing or invalid. Set real values via
          inventories/prod/group_vars/all/secrets.local.yml (preferred) or
          VAULT_* environment variables before running this playbook.

    - name: Validate deploy_filter_systemd matches an app
      assert:
        that:
          - _python_apps_target | length > 0
        fail_msg: >-
          deploy_filter_systemd '{{ deploy_filter_systemd }}' did not match any python_apps entry.
          Use app_systemd_name values from group_vars/backend.yml (e.g. backendserver, geoserver, llmserver).
      when: deploy_filter_systemd | default('') != ''

  roles:
    - nginx
  tasks:
    - name: Ensure software-properties-common is installed (provides add-apt-repository)
      apt:
        name: software-properties-common
        state: present
        update_cache: yes
      when: backend_install_freecad | default(false)

    - name: Add FreeCAD stable PPA (provides freecad-python3 on Ubuntu Noble)
      apt_repository:
        repo: "ppa:freecad-maintainers/freecad-stable"
        state: present
        update_cache: yes
      when: backend_install_freecad | default(false)

    - name: Install FreeCAD Python bindings (GEO / defeaturing)
      apt:
        name: freecad-python3
        state: present
        update_cache: yes
      when: backend_install_freecad | default(false)

    - name: Set up Miniconda + freecad_env for GEO service
      include_role:
        name: conda
      vars:
        conda_user: mateen_fastians
        conda_install_dir: /home/mateen_fastians/miniconda3
        conda_env_name: freecad_env
        conda_python_version: "3.12"
        conda_freecad_version: "1.0.0"
        conda_occ_version: "7.8.1.1"
      when: >-
        _python_apps_target
        | selectattr('app_use_conda', 'defined')
        | selectattr('app_use_conda', 'equalto', true)
        | list | length > 0

    - name: Deploy Python applications
      include_role:
        name: python_app
      vars:
        app_name: "{{ item.name }}"
        app_port: "{{ item.port }}"
        app_repo_url: "{{ item.repo_url }}"
        app_branch: "{{ deploy_branch_override | default(item.branch) }}"
        app_description: "{{ item.description }}"
        app_base_dir: "{{ item.app_base_dir | default(omit) }}"
        app_env_template: "{{ item.app_env_template | default(omit) }}"
        app_systemd_name: "{{ item.app_systemd_name | default(omit) }}"
        app_requirements_path: "{{ item.app_requirements_path | default('requirements.txt') }}"
        app_entry_point: "{{ item.app_entry_point | default(omit) }}"
        app_extra_dirs: "{{ item.app_extra_dirs | default([]) }}"
        app_python_version: "{{ item.app_python_version | default(backend_app_python_version | default('3.12')) }}"
        app_git_reset_to_origin: "{{ item.app_git_reset_to_origin | default(python_app_git_reset_to_origin | default(false)) }}"
        app_use_conda: "{{ item.app_use_conda | default(false) }}"
        app_conda_dir: "{{ item.app_conda_dir | default('/home/mateen_fastians/miniconda3') }}"
        app_conda_env_name: "{{ item.app_conda_env_name | default('freecad_env') }}"
      loop: "{{ _python_apps_target }}"
