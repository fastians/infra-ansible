---
# Re-render MEK_LAB_BACKEND .env from Ansible vars (e.g. vault_openrouter_api_key) and restart backendserver.
#
# This is the right way to push OpenRouter / env changes without a full code deploy.
# ./scripts/seed backendserver only runs the DB seeder — it does NOT refresh .env.
#
# Usage (from infra_ansible):
#   ansible-playbook -i inventories/prod/hosts.ini playbooks/resync-backendserver-env.yml --limit backend-server
#
# Layout matches inventories/prod/group_vars/backend.yml (mateen_fastians, ~/.apps).

- hosts: backend
  become: yes
  pre_tasks:
    - name: Validate backend env values before rendering
      assert:
        that:
          - vault_backend_database_url is defined
          - vault_backend_database_url | length > 0
          - vault_backend_database_url != "CHANGE_ME"
          - vault_backend_database_url is match('^postgresql(\\+[^:]+)?:\\/\\/.+')
          - vault_backend_secret_key is defined
          - vault_backend_secret_key | length >= 32
          - vault_backend_secret_key != "CHANGE_ME"
          - vault_internal_api_key is defined
          - vault_internal_api_key | length > 0
          - vault_internal_api_key != "CHANGE_ME"
        fail_msg: >-
          Cannot render backendserver .env with placeholder values.
          Configure secrets.local.yml or export VAULT_* variables first.
  tasks:
    - name: Render backendserver .env for MEK_LAB_BACKEND
      template:
        src: "{{ playbook_dir }}/../roles/python_app/templates/env/backendserver.env.j2"
        dest: "/home/mateen_fastians/.apps/MEK_LAB_BACKEND/.env"
        owner: mateen_fastians
        group: mateen_fastians
        mode: "0600"
      when: inventory_hostname == 'backend-server'
      notify: Restart backendserver

  handlers:
    - name: Restart backendserver
      systemd:
        name: backendserver
        state: restarted
        daemon_reload: true
      become: true
