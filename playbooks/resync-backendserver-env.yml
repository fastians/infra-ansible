---
# Re-render MEK_LAB_BACKEND .env from Ansible vars (e.g. vault_openrouter_api_key) and restart backendserver.
#
# This is the right way to push OpenRouter / env changes without a full code deploy.
# ./seed backendserver only runs the DB seeder — it does NOT refresh .env.
#
# Usage (from infra_ansible):
#   ansible-playbook -i inventories/prod/hosts.ini playbooks/resync-backendserver-env.yml --limit backend-server
#
# Layout matches inventories/prod/group_vars/backend.yml (mateen_fastians, ~/.apps).

- hosts: backend
  become: yes
  tasks:
    - name: Render backendserver .env for MEK_LAB_BACKEND
      template:
        src: roles/python_app/templates/env/backendserver.env.j2
        dest: "/home/mateen_fastians/.apps/MEK_LAB_BACKEND/.env"
        owner: mateen_fastians
        group: mateen_fastians
        mode: "0600"
      when: inventory_hostname == 'backend-server'
      notify: Restart backendserver

  handlers:
    - name: Restart backendserver
      systemd:
        name: backendserver
        state: restarted
        daemon_reload: true
      become: true
