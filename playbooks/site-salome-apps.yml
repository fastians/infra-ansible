---
- name: Salome Server (apps only)
  hosts: salome
  become: yes
  roles:
    - nginx
  tasks:
    - name: Ensure Salome app user exists
      user:
        name: mateen_fastians
        shell: /bin/bash
        create_home: yes
      become: yes

    - name: Ensure Salome user home is owned by app user
      file:
        path: /home/mateen_fastians
        state: directory
        owner: mateen_fastians
        group: mateen_fastians
        mode: "0750"
      become: yes

    # Ensure opt exists so deploy.sh and app dirs live here; avoid clone wiping parent
    - name: Ensure Salome opt directory exists
      file:
        path: /home/mateen_fastians/opt
        state: directory
        owner: mateen_fastians
        group: mateen_fastians
        mode: "0755"
      become: yes

    - name: Deploy Salome applications
      include_role:
        name: python_app
      vars:
        app_name: "{{ item.name }}"
        app_port: "{{ item.port }}"
        app_repo_url: "{{ item.repo_url }}"
        app_branch: "{{ item.branch }}"
        app_description: "{{ item.description }}"
        app_base_dir: "{{ item.app_base_dir | default(omit) }}"
        app_env_template: "{{ item.app_env_template | default(omit) }}"
        app_systemd_name: "{{ item.app_systemd_name | default(omit) }}"
        app_requirements_path: "{{ item.app_requirements_path | default('requirements.txt') }}"
        app_entry_point: "{{ item.app_entry_point | default(omit) }}"
        app_extra_dirs: "{{ item.app_extra_dirs | default(omit) }}"
        app_python_version: "{{ item.app_python_version | default(backend_app_python_version | default('3.12')) }}"
      loop: "{{ python_apps }}"

    # psmisc provides fuser; salomeserver unit uses it to free port 8000 before start
    - name: Ensure psmisc installed (for salomeserver ExecStartPre)
      apt:
        name: psmisc
        state: present
      become: yes

    # Salome: .env in app/ so the app finds it; unit loads app/.env
    - name: Deploy Salome app/.env
      template:
        src: "{{ playbook_dir }}/../roles/python_app/templates/env/salomeserver.env.j2"
        dest: "{{ python_apps[0].app_base_dir }}/{{ python_apps[0].name }}/app/.env"
        owner: mateen_fastians
        group: mateen_fastians
        mode: "0600"
      vars:
        app_user: mateen_fastians
        app_base_dir: "{{ python_apps[0].app_base_dir }}"
        app_name: "{{ python_apps[0].name }}"

    - name: Deploy salomeserver.service
      template:
        src: "{{ playbook_dir }}/templates/salomeserver.service.j2"
        dest: /etc/systemd/system/salomeserver.service
        mode: "0644"
      vars:
        app_user: mateen_fastians
        app_base_dir: "{{ python_apps[0].app_base_dir }}"
        app_name: "{{ python_apps[0].name }}"
        app_description: "{{ python_apps[0].description }}"
        app_entry_point: "{{ python_apps[0].app_entry_point }}"
        app_port: "{{ python_apps[0].port }}"
        app_workers: 1

    - name: Restart and enable salomeserver
      systemd:
        name: salomeserver
        state: restarted
        enabled: yes
        daemon_reload: yes
